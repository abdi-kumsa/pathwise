version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: pathwise_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: pathwise_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml:/ml
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: pathwise_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      VITE_API_URL: http://localhost:${API_PORT}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
